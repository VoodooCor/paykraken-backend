<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Pay Blood Kraken</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #17212b;
        color: #fff;
        margin: 0;
        padding: 16px;
      }

      .card {
        background: #1f2c3a;
        border-radius: 12px;
        padding: 16px;
        max-width: 720px;
        margin: 0 auto;
      }

      h1 {
        margin-top: 0;
      }

      input, button {
        width: 100%;
        box-sizing: border-box;
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
      }

      input {
        background: #fff;
        color: #000;
      }

      button {
        background: #2ea6ff;
        color: #fff;
        cursor: pointer;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #0f1720;
        padding: 12px;
        border-radius: 8px;
        margin-top: 12px;
      }

      .muted {
        opacity: 0.8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Pay Blood Kraken</h1>
      <div id="userInfo" class="muted">Загрузка Telegram данных...</div>

      <input id="externalId" placeholder="External ID (если не пришёл через startapp)" />

      <button id="btnMe">Проверить мой аккаунт</button>
      <button id="btnLink">Привязать Telegram к External ID</button>

      <pre id="output">Ожидание...</pre>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      const output = document.getElementById('output');
      const userInfo = document.getElementById('userInfo');
      const externalIdInput = document.getElementById('externalId');

      const initData = tg.initData || '';
      const startParam = tg.initDataUnsafe?.start_param || '';
      const tgUser = tg.initDataUnsafe?.user || null;

      if (startParam) {
        externalIdInput.value = startParam;
      }

      userInfo.textContent = tgUser
        ? `Telegram: ${tgUser.first_name || ''} ${tgUser.last_name || ''} (@${tgUser.username || 'no_username'}, id=${tgUser.id})`
        : 'Telegram user не найден. Открой Mini App именно внутри Telegram.';

      async function api(path, options = {}) {
        const headers = {
          'Content-Type': 'application/json',
          'X-Telegram-Init-Data': initData,
          ...(options.headers || {})
        };

        const response = await fetch(path, {
          ...options,
          headers
        });

        const text = await response.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = text;
        }

        output.textContent = JSON.stringify(
          {
            status: response.status,
            ok: response.ok,
            data
          },
          null,
          2
        );

        return { response, data };
      }

      document.getElementById('btnMe').addEventListener('click', async () => {
        try {
          await api('/api/telegram/me', {
            method: 'GET'
          });
        } catch (err) {
          output.textContent = String(err);
        }
      });

      document.getElementById('btnLink').addEventListener('click', async () => {
        try {
          const externalId = externalIdInput.value.trim();
          await api('/api/telegram/link', {
            method: 'POST',
            body: JSON.stringify({ externalId })
          });
        } catch (err) {
          output.textContent = String(err);
        }
      });
    </script>
  </body>
</html>
